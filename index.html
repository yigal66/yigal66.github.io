<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuga Lock</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #111827; color: #f0f0f0;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 40px 20px;
  }
  h1  { font-size: 1.6rem; margin-bottom: 4px; }
  .sub { color: #6b7280; font-size: 0.85rem; margin-bottom: 32px; }

  #btnConnect {
    width: 100%; max-width: 340px; padding: 16px;
    border: none; border-radius: 14px;
    font-size: 1rem; font-weight: 700; cursor: pointer;
    margin-bottom: 28px; background: #1a73e8; color: #fff;
    transition: background .2s;
  }
  #btnConnect.connected { background: #059669; }

  .state-card {
    width: 100%; max-width: 340px; background: #1f2937;
    border-radius: 20px; padding: 32px 20px; text-align: center;
    margin-bottom: 20px; border: 2px solid #374151;
    transition: border-color .3s;
  }
  .state-card.unlocked { border-color: #00d4aa; }
  .state-card.locked   { border-color: #ef5350; }
  .car-emoji { font-size: 80px; line-height: 1; margin-bottom: 14px; }
  .car-label { font-size: 1.5rem; font-weight: 800; letter-spacing: .06em; }
  .car-label.unlocked { color: #00d4aa; }
  .car-label.locked   { color: #ef5350; }

  .rssi-wrap { width: 100%; max-width: 340px; margin-bottom: 20px; }
  .rssi-label {
    font-size: 0.78rem; color: #9ca3af; margin-bottom: 6px;
    display: flex; justify-content: space-between;
  }
  .rssi-track { height: 10px; background: #374151; border-radius: 5px; overflow: hidden; }
  .rssi-fill  {
    height: 100%; width: 0; border-radius: 5px;
    background: linear-gradient(90deg, #ef5350, #ffb300, #00d4aa);
    transition: width .5s;
  }

  .btn-row { display: flex; gap: 14px; width: 100%; max-width: 340px; margin-bottom: 20px; }
  .btn-row button {
    flex: 1; padding: 22px 0; border-radius: 16px;
    font-size: 1.05rem; font-weight: 700; cursor: pointer;
    border: 2px solid transparent; transition: opacity .15s;
  }
  .btn-row button:active { opacity: .7; }
  .btn-unlock { background: #00d4aa22; border-color: #00d4aa !important; color: #00d4aa; }
  .btn-lock   { background: #ef535022; border-color: #ef5350 !important; color: #ef5350; }

  .log {
    width: 100%; max-width: 340px; background: #1f2937;
    border-radius: 12px; padding: 12px 14px;
    font-size: 0.75rem; color: #6b7280;
    max-height: 130px; overflow-y: auto;
  }
  .log p { margin-bottom: 4px; }
  .log p.ok  { color: #00d4aa; }
  .log p.err { color: #ef5350; }
  .log p.inf { color: #9ca3af; }
</style>
</head>
<body>

<h1>🚗 Kuga Lock</h1>
<p class="sub">Ford Kuga 2016 · BLE Remote</p>

<button id="btnConnect" onclick="connectBLE()">🔵 Connect to Car</button>

<div class="state-card locked" id="stateCard">
  <div class="car-emoji" id="carEmoji">🔒</div>
  <div class="car-label locked" id="carLabel">LOCKED</div>
</div>

<div class="rssi-wrap">
  <div class="rssi-label">
    <span>📶 Signal Strength</span>
    <span id="rssiVal">-- dBm</span>
  </div>
  <div class="rssi-track"><div class="rssi-fill" id="rssiFill"></div></div>
</div>

<div class="btn-row">
  <button class="btn-unlock" onclick="sendCmd(0x01)">🔓 UNLOCK</button>
  <button class="btn-lock"   onclick="sendCmd(0x02)">🔒 LOCK</button>
</div>

<div class="log" id="log">
  <p class="inf">▸ Tap Connect to pair with KugaLock ESP32</p>
</div>

<script>
const SVC    = '12345678-1234-1234-1234-123456789abc';
const C_CMD  = 'abcd1234-ab12-cd34-ef56-abcdef012345';
const C_STAT = 'abcd1235-ab12-cd34-ef56-abcdef012345';
const C_RSSI = 'abcd1236-ab12-cd34-ef56-abcdef012345';

let cmdChar = null;
let device  = null;

function log(msg, cls = 'inf') {
  const d = document.getElementById('log');
  const p = document.createElement('p');
  p.className = cls;
  p.textContent = '▸ ' + msg;
  d.appendChild(p);
  d.scrollTop = d.scrollHeight;
}

function setCarState(locked) {
  document.getElementById('stateCard').className = 'state-card ' + (locked ? 'locked' : 'unlocked');
  document.getElementById('carEmoji').textContent  = locked ? '🔒' : '🔓';
  document.getElementById('carLabel').className    = 'car-label ' + (locked ? 'locked' : 'unlocked');
  document.getElementById('carLabel').textContent  = locked ? 'LOCKED' : 'UNLOCKED';
}

function setRSSI(rssi) {
  document.getElementById('rssiVal').textContent = rssi + ' dBm';
  const pct = Math.max(0, Math.min(100, ((rssi - (-100)) / 70) * 100));
  document.getElementById('rssiFill').style.width = pct + '%';
}

async function connectBLE() {
  if (!navigator.bluetooth) {
    log('Web Bluetooth not available. Enable: chrome://flags → Experimental Web Platform Features', 'err');
    return;
  }
  try {
    log('Scanning for KugaLock...');
    device = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'KugaLock' }],
      optionalServices: [SVC]
    });
    device.addEventListener('gattserverdisconnected', () => {
      log('Disconnected — reconnecting...', 'err');
      cmdChar = null;
      const btn = document.getElementById('btnConnect');
      btn.className = '';
      btn.textContent = '🔵 Reconnect';
      setTimeout(doConnect, 2000);
    });
    await doConnect();
  } catch(e) {
    log('Error: ' + e.message, 'err');
  }
}

async function doConnect() {
  try {
    log('Connecting...');
    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService(SVC);

    cmdChar = await service.getCharacteristic(C_CMD);

    const statChar = await service.getCharacteristic(C_STAT);
    await statChar.startNotifications();
    statChar.addEventListener('characteristicvaluechanged', e => {
      const val = new TextDecoder().decode(e.target.value).trim();
      setCarState(val === 'LOCKED');
      log('State: ' + val, val === 'LOCKED' ? 'inf' : 'ok');
    });

    const rssiChar = await service.getCharacteristic(C_RSSI);
    await rssiChar.startNotifications();
    rssiChar.addEventListener('characteristicvaluechanged', e => {
      const rssi = parseInt(new TextDecoder().decode(e.target.value));
      if (!isNaN(rssi)) setRSSI(rssi);
    });

    const btn = document.getElementById('btnConnect');
    btn.textContent = '✅ Connected to KugaLock';
    btn.className = 'connected';
    log('Connected! Proximity unlock active.', 'ok');
  } catch(e) {
    log('Connect failed: ' + e.message, 'err');
    setTimeout(doConnect, 3000);
  }
}

async function sendCmd(byte) {
  if (!cmdChar) { log('Not connected — tap Connect first', 'err'); return; }
  try {
    await cmdChar.writeValue(new Uint8Array([byte]));
    log(byte === 0x01 ? 'Manual UNLOCK sent' : 'Manual LOCK sent',
        byte === 0x01 ? 'ok' : 'inf');
  } catch(e) {
    log('Send error: ' + e.message, 'err');
  }
}
</script>
</body>
</html>
